<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>高三知识点掌握情况调研 - 填写</title>
<style>
:root{
--p:#1565C0;--pl:#42A5F5;--pd:#0D47A1;--pll:#90CAF9;
--bg:linear-gradient(160deg,#E3F2FD 0%,#F5F9FF 40%,#FFFFFF 60%,#E8F0FE 100%);
--card:#fff;--tp:#1A237E;--ts:#5C6BC0;--tm:#9FA8DA;
--border:#BBDEFB;--sh:0 2px 12px rgba(21,101,192,.08);--shh:0 4px 20px rgba(21,101,192,.15);
--r:14px;--rs:10px;
--m1:#43A047;--m2:#1565C0;--m3:#FB8C00;--m4:#E53935;
--m1b:#E8F5E9;--m2b:#E3F2FD;--m3b:#FFF3E0;--m4b:#FFEBEE;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;font-size:15px;line-height:1.6;padding-top:30px;padding-bottom:28px}
.view{display:none;min-height:100vh}
.view.active{display:block}
.container{max-width:860px;margin:0 auto;padding:16px}

/* Header */
.hdr{background:linear-gradient(135deg,var(--p) 0%,var(--pl) 100%);color:#fff;padding:18px 16px;text-align:center;box-shadow:var(--sh);position:sticky;top:30px;z-index:100}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:1px}
.hdr p{font-size:12px;opacity:.85;margin-top:2px}

/* Survey */
.survey-wrap{padding-bottom:80px}
.progress-bar{position:sticky;top:30px;background:linear-gradient(135deg,var(--p),var(--pl));padding:10px 16px;z-index:100;box-shadow:var(--sh)}
.progress-track{display:flex;align-items:center;gap:2px;max-width:860px;margin:0 auto}
.prog-dot{flex:1;height:6px;background:rgba(255,255,255,.3);border-radius:3px;transition:all .3s}
.prog-dot.done{background:#fff}
.prog-dot.cur{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.8)}
.prog-label{color:#fff;font-size:12px;text-align:center;margin-top:6px;max-width:860px;margin-left:auto;margin-right:auto}
.step-content{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.step-header{text-align:center;padding:20px 16px 12px}
.step-header h2{font-size:20px;color:var(--p)}
.step-header .sub{font-size:13px;color:var(--ts);margin-top:2px}
.step-header .desc{font-size:12px;color:var(--tm);margin-top:4px}
.name-input-wrap{text-align:center;padding:20px 16px}
.name-input{width:100%;max-width:360px;padding:14px 18px;border:2px solid var(--border);border-radius:var(--rs);font-size:17px;color:var(--tp);background:#fff;transition:border .2s;text-align:center}
.name-input:focus{outline:none;border-color:var(--pl);box-shadow:0 0 0 3px rgba(66,165,245,.15)}
.name-hint{font-size:12px;color:var(--tm);margin-top:8px}

/* Knowledge items */
.kp-list{padding:0 4px}
.kp-item{background:#fff;border-radius:var(--rs);margin-bottom:10px;padding:14px;box-shadow:var(--sh);border:1px solid #EEF5FD;transition:all .2s}
.kp-item.answered{border-left:3px solid var(--pl)}
.kp-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.kp-badge{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.kp-info{flex:1}
.kp-title{font-size:14px;font-weight:500;color:var(--tp);line-height:1.4}
.kp-mod{font-size:11px;color:var(--tm);margin-top:2px;display:inline-block;background:var(--m2b);padding:1px 8px;border-radius:10px}
.mastery-row{display:flex;gap:6px;flex-wrap:wrap}
.mbtn{flex:1;min-width:68px;padding:9px 4px;border:2px solid var(--border);border-radius:var(--rs);background:#fff;font-size:12px;font-weight:600;color:var(--ts);cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.mbtn:active{transform:scale(.96)}
.mbtn.sel[data-v="mastered"]{background:var(--m1);border-color:var(--m1);color:#fff}
.mbtn.sel[data-v="basic"]{background:var(--m2);border-color:var(--m2);color:#fff}
.mbtn.sel[data-v="partial"]{background:var(--m3);border-color:var(--m3);color:#fff}
.mbtn.sel[data-v="unknown"]{background:var(--m4);border-color:var(--m4);color:#fff}
.mbtn:not(.sel):hover{border-color:var(--pl);color:var(--p)}

/* Unanswered warning */
.kp-item.unanswered-warn{border:2px solid var(--m4) !important;border-left:3px solid var(--m4) !important;animation:kpShake .5s ease, kpPulse 1.5s ease .5s 2}
@keyframes kpShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes kpPulse{0%,100%{box-shadow:0 2px 12px rgba(229,57,53,.08)}50%{box-shadow:0 2px 20px rgba(229,57,53,.35)}}

/* Survey nav */
.survey-nav{position:fixed;bottom:28px;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;z-index:100;box-shadow:0 -2px 10px rgba(21,101,192,.06)}
.survey-nav-inner{max-width:860px;margin:0 auto;display:flex;gap:10px}
.survey-nav .btn{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 28px;border:none;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;box-shadow:0 3px 10px rgba(21,101,192,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(21,101,192,.4)}
.btn-outline{background:#fff;color:var(--p);border:2px solid var(--border)}
.btn-outline:hover{border-color:var(--pl);background:var(--m2b)}
.btn-sm{padding:8px 16px;font-size:13px}

/* Summary */
.summary-wrap{padding:16px}
.summary-card{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.summary-card h3{font-size:15px;color:var(--p);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sum-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.sum-label{width:50px;font-weight:600;color:var(--ts)}
.sum-bars{flex:1;height:20px;border-radius:10px;overflow:hidden;display:flex;background:#f0f0f0}
.sum-bar{height:100%;transition:width .4s}
.sum-bar[data-v="mastered"]{background:var(--m1)}
.sum-bar[data-v="basic"]{background:var(--m2)}
.sum-bar[data-v="partial"]{background:var(--m3)}
.sum-bar[data-v="unknown"]{background:var(--m4)}
.sum-pct{width:44px;text-align:right;font-weight:600;color:var(--p)}

/* Results */
.res-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:50}
.res-tab{flex:1;padding:12px 4px;text-align:center;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.res-tab.active{color:var(--p);border-bottom-color:var(--p)}
.res-tab .ico{font-size:18px;display:block;margin-bottom:2px}
.tab-content{display:none;animation:fadeUp .3s ease}
.tab-content.active{display:block}
.res-actions{display:flex;gap:8px;padding:12px 4px;flex-wrap:wrap}
.res-actions .btn{flex:1;min-width:120px}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 4px 12px}
.stat-card{background:#fff;border-radius:var(--rs);padding:14px;box-shadow:var(--sh);text-align:center}
.stat-card .val{font-size:26px;font-weight:700;color:var(--p)}
.stat-card .val.red{color:var(--m4)}
.stat-card .val.green{color:var(--m1)}
.stat-card .val.orange{color:var(--m3)}
.stat-card .lbl{font-size:12px;color:var(--ts);margin-top:2px}

/* Charts */
.chart-card{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.chart-card h3{font-size:14px;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.bar-label{width:36px;font-weight:600;color:var(--ts);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;border-radius:6px;overflow:hidden;display:flex;background:#F5F5F5}
.bar-seg{height:100%;transition:width .5s ease}
.bar-seg[data-v="mastered"]{background:var(--m1)}
.bar-seg[data-v="basic"]{background:var(--m2)}
.bar-seg[data-v="partial"]{background:var(--m3)}
.bar-seg[data-v="unknown"]{background:var(--m4)}
.bar-val{width:40px;text-align:right;font-weight:600;color:var(--p);flex-shrink:0}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--ts)}
.legend span{display:flex;align-items:center;gap:3px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

/* Weak points */
.wp-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:var(--rs);margin-bottom:6px;font-size:13px;box-shadow:var(--sh);border-left:3px solid var(--m4)}
.wp-item.partial{border-left-color:var(--m3)}
.wp-item.basic{border-left-color:var(--m2)}
.wp-item.mastered{border-left-color:var(--m1)}
.wp-badge{font-size:11px;font-weight:700;color:#fff;padding:2px 6px;border-radius:8px}
.wp-badge.mastered{background:var(--m1)}
.wp-badge.basic{background:var(--m2)}
.wp-badge.partial{background:var(--m3)}
.wp-badge.unknown{background:var(--m4)}
.wp-info{flex:1}
.wp-title{font-weight:500;color:var(--tp)}
.wp-sub{font-size:11px;color:var(--tm)}

/* Subject detail */
.subj-detail-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.subj-detail-icon{font-size:20px}
.subj-detail-name{font-size:16px;font-weight:700;color:var(--p);flex:1}
.subj-detail-pct{font-size:16px;font-weight:700;color:var(--m2)}
.kp-cat-group{margin-bottom:8px}
.kp-cat-hdr{font-size:13px;font-weight:600;padding:5px 10px;border-radius:var(--rs);margin-bottom:4px}
.kp-cat-hdr.c-unknown{color:var(--m4);background:var(--m4b)}
.kp-cat-hdr.c-partial{color:var(--m3);background:var(--m3b)}
.kp-cat-hdr.c-basic{color:var(--m2);background:var(--m2b)}
.kp-cat-hdr.c-mastered{color:var(--m1);background:var(--m1b)}

/* Radar */
.radar-wrap{display:flex;justify-content:center;padding:10px 0}
.radar-svg{max-width:280px;width:100%;height:auto}

/* Doubao banner */
.db-banner{background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;border-radius:var(--r);padding:16px;margin:12px 4px;text-align:center}
.db-banner h4{font-size:15px;margin-bottom:4px}
.db-banner p{font-size:12px;opacity:.9;margin-bottom:10px}
.db-btn{background:#fff;color:#1a73e8;border:none;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.db-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}

/* Toast */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(33,33,33,.92);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:300;opacity:0;transition:all .3s;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:var(--m1)}
.toast.error{background:var(--m4)}

/* Loading overlay */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid var(--m2b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--p);font-weight:600}

/* Cloud badge */
.cloud-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.2);margin-left:8px;vertical-align:middle}
.cloud-badge.online{background:rgba(76,175,80,.2)}
.cloud-badge.offline{background:rgba(255,255,255,.15)}
.cloud-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cloud-dot.on{background:#4CAF50;box-shadow:0 0 4px #4CAF50}
.cloud-dot.off{background:#bbb}

/* Privacy banner */
.privacy-banner{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:1px solid #A5D6A7;border-radius:var(--r);padding:12px 16px;margin:8px 4px;display:flex;align-items:center;gap:8px;font-size:13px;color:#2E7D32}

/* Survey intro */
.intro-card{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;border:1px solid var(--border)}
.intro-card h3{font-size:15px;color:var(--p);margin-bottom:10px;display:flex;align-items:center;gap:6px;border-bottom:2px solid var(--m2b);padding-bottom:6px}
.subj-intro-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:600px){.subj-intro-grid{grid-template-columns:1fr 1fr}}
.subj-intro-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:var(--rs);background:var(--bg);border:1px solid var(--border)}
.subj-intro-icon{font-size:22px;flex-shrink:0}
.subj-intro-info{flex:1}
.subj-intro-name{font-size:14px;font-weight:700;color:var(--tp)}
.subj-intro-name .tag{font-size:11px;font-weight:400;color:#fff;background:var(--p);padding:1px 6px;border-radius:8px;margin-left:4px}
.subj-intro-desc{font-size:12px;color:var(--ts);margin-top:2px;line-height:1.4}
.mastery-intro{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:4px}
@media(min-width:600px){.mastery-intro{grid-template-columns:repeat(4,1fr)}}
.mastery-intro-item{text-align:center;padding:8px 4px;border-radius:var(--rs);font-size:12px;font-weight:600}
.mastery-intro-item .dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.feature-intro{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:600px){.feature-intro{grid-template-columns:repeat(3,1fr)}}
.feature-intro-item{padding:10px 12px;border-radius:var(--rs);background:var(--bg);border:1px solid var(--border);text-align:center}
.feature-intro-item .ico{font-size:24px;display:block;margin-bottom:4px}
.feature-intro-item .ttl{font-size:13px;font-weight:700;color:var(--p)}
.feature-intro-item .dsc{font-size:11px;color:var(--ts);margin-top:2px}
.flow-steps{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px}
.flow-step{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;padding:6px 10px;border-radius:var(--rs);font-size:12px;font-weight:600}
.flow-arrow{color:var(--pl);font-size:14px;font-weight:700}

/* Responsive */
@media(min-width:600px){
.stat-grid{grid-template-columns:repeat(4,1fr)}
.stat-grid-6{grid-template-columns:repeat(3,1fr)}
.hdr h1{font-size:24px}
.step-header h2{font-size:24px}
.mbtn{font-size:13px}
}
@media(max-width:360px){
.mbtn{min-width:56px;font-size:11px;padding:8px 2px}
.kp-badge{width:22px;height:22px;font-size:11px}
}

/* Site topbar & footer */
.site-topbar{position:fixed;top:0;left:0;right:0;height:30px;background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;letter-spacing:1px;z-index:1000;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.site-footer{position:fixed;bottom:0;left:0;right:0;height:28px;background:#1A237E;color:rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center;font-size:11px;z-index:1000;box-shadow:0 -2px 4px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div class="site-topbar">2024级七班知识点调研</div>

<!-- ============ SURVEY VIEW ============ -->
<div id="survey-view" class="view active">
<div class="progress-bar">
<div class="progress-track" id="prog-track"></div>
<div class="prog-label" id="prog-label"></div>
</div>
<div class="container survey-wrap">
<div id="step-content" class="step-content"></div>
</div>
<div class="survey-nav">
<div class="survey-nav-inner">
<button class="btn btn-outline" id="btn-prev" onclick="prevStep()">← 上一步</button>
<button class="btn btn-primary" id="btn-next" onclick="nextStep()">下一步 →</button>
</div>
</div>
</div>

<!-- ============ RESULTS VIEW ============ -->
<div id="results-view" class="view">
<div class="hdr">
<h1>📊 我的学情分析</h1>
<p id="res-subtitle"><span class="cloud-badge offline" id="res-cloud"><span class="cloud-dot off"></span>本地模式</span></p>
</div>
<div class="res-tabs">
<div class="res-tab active" data-tab="parent" onclick="switchTab('parent')"><span class="ico">👨‍👩‍👧</span>家长视角</div>
<div class="res-tab" data-tab="student" onclick="switchTab('student')"><span class="ico">📖</span>学生视角</div>
</div>
<div class="container">
<div class="privacy-banner">
<span style="font-size:18px">🔒</span>
<span>隐私保护：以下仅显示<b>您自己</b>的调研数据，其他同学的数据不可见。班级平均数据仅用于对比参考。</span>
</div>
<div class="res-actions">
<button class="btn btn-outline btn-sm" onclick="restartSurvey()">🔄 重新填报</button>
<button class="btn btn-outline btn-sm" onclick="downloadMyReport()">📄 导出报告</button>
</div>
<div id="tab-parent" class="tab-content active"></div>
<div id="tab-student" class="tab-content"></div>
</div>
</div>

<!-- ============ LOADING ============ -->
<div id="loading-overlay" class="loading-overlay">
<div class="spinner"></div>
<div class="loading-text" id="loading-text">正在加载数据...</div>
</div>

<!-- ============ TOAST ============ -->
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== DATA =====

{id:'K',t:'作文错题复盘与个性化升格指导',m:'写作提升'},
]},

{id:'D',t:'导数基础与切线方程求解',m:'函数与导数'},

async function loadMyData(){

S.allStudents=(data||[]).map(d=>({id:d.id,name:d.name,timestamp:d.timestamp,responses:d.responses||{}}));

}
}

async function saveToCloud(data){
if(!isCloud)return;
try{
const{data:existing,error:selErr}=await supabaseClient.from('survey_responses').select('id').eq('name',data.name);
if(selErr)throw selErr;
if(existing&&existing.length>0){
const{error}=await supabaseClient.from('survey_responses').update({timestamp:data.timestamp,responses:data.responses}).eq('id',existing[0].id);
if(error)throw error;
}else{
const{error}=await supabaseClient.from('survey_responses').insert([{name:data.name,timestamp:data.timestamp,responses:data.responses}]);
if(error)throw error;
}
}catch(e){
console.error('Cloud save failed:',e);
toast('云端保存失败：'+e.message,'error');
}
}

// ===== STATS =====
function calcStudentStats(stu){
const subjStats={};
let totalScore=0,totalCount=0;
SUBJECTS.forEach(sub=>{
const resps=stu.responses[sub.id]||{};
let score=0,count=0;
const counts={mastered:0,basic:0,partial:0,unknown:0,none:0};
sub.items.forEach(it=>{
const v=resps[it.id];
if(v){score+=MASTERY[v].score;count++;counts[v]++;}
else{counts.none++;}
});
const total=sub.items.length;
const pct=count>0?Math.round(score/count/4*100):0;
subjStats[sub.id]={score,count,total,pct,counts,items:sub.items.map(it=>({id:it.id,title:it.t,module:it.m,value:resps[it.id]||null}))};
if(count>0){totalScore+=score;totalCount+=count;}
});
return{subjStats,overallPct:totalCount>0?Math.round(totalScore/totalCount/4*100):0,overallScore:totalScore,overallCount:totalCount};
}

function calcClassStats(){
const n=S.allStudents.length;
if(n===0)return null;
const subjStats={};
SUBJECTS.forEach(sub=>{
let totalScore=0,totalCount=0;
const kpStats={};
sub.items.forEach(it=>{
let score=0,count=0;
const dist={mastered:0,basic:0,partial:0,unknown:0,none:0};
S.allStudents.forEach(stu=>{
const v=stu.responses[sub.id]&&stu.responses[sub.id][it.id];
if(v){score+=MASTERY[v].score;count++;dist[v]++;}
else{dist.none++;}
});
kpStats[it.id]={title:it.t,module:it.m,score,count,avgPct:count>0?Math.round(score/count/4*100):0,dist};
totalScore+=score;totalCount+=count;
});
subjStats[sub.id]={kpStats,totalScore,totalCount,avgPct:totalCount>0?Math.round(totalScore/totalCount/4*100):0};
});
return{n,subjStats};
}

// ===== RADAR CHART =====
function renderRadar(subjStats){
const cx=140,cy=140,r=100;
const n=6;
const labels=SUBJECTS.map(s=>s.name);
const scores=SUBJECTS.map(s=>subjStats[s.id].pct/100);
const angles=labels.map((_,i)=>-Math.PI/2+i*2*Math.PI/n);
let grid='';
for(let lv=1;lv<=4;lv++){
const pts=angles.map(a=>`${cx+Math.cos(a)*r*lv/4},${cy+Math.sin(a)*r*lv/4}`).join(' ');
grid+=`<polygon points="${pts}" fill="none" stroke="#BBDEFB" stroke-width="1" opacity="${0.3+lv*0.15}"/>`;
}
let axes=angles.map(a=>`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="#BBDEFB" stroke-width="1"/>`).join('');
let labelsSVG=labels.map((lb,i)=>{
const x=cx+Math.cos(angles[i])*(r+18);
const y=cy+Math.sin(angles[i])*(r+18);
return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="#1565C0" font-size="13" font-weight="600">${lb}</text>`;
}).join('');
let pts=scores.map((sc,i)=>`${cx+Math.cos(angles[i])*r*sc},${cy+Math.sin(angles[i])*r*sc}`).join(' ');
let dots=scores.map((sc,i)=>{
const x=cx+Math.cos(angles[i])*r*sc;
const y=cy+Math.sin(angles[i])*r*sc;
return `<circle cx="${x}" cy="${y}" r="3" fill="#1565C0"/>`;
}).join('');
return `<svg class="radar-svg" viewBox="0 0 280 280">${grid}${axes}<polygon points="${pts}" fill="rgba(21,101,192,0.15)" stroke="#1565C0" stroke-width="2" stroke-linejoin="round"/>${dots}${labelsSVG}</svg>`;
}

txt+=`  ${cat}（${items.length}个）：`;
txt+=items.length?items.map(it=>`${it.id}.${it.title}`).join('；'):'无';
txt+='\n';
});
});

if(perspective==='parent'){
txt+=`

请分析以下内容：

// ===== REPORT GENERATION =====
function buildReportHTML(stu,classAvgData){
if(!stu)return'';
const st=calcStudentStats(stu);
const ca=classAvgData||{n:0,avgs:{}};
const reportDate=new Date().toLocaleString('zh-CN');
let compHTML='';
SUBJECTS.forEach(sub=>{
const ss=st.subjStats[sub.id];
const classAvg=ca.avgs?ca.avgs[sub.id]:0;
const diff=ss.pct-classAvg;
const diffColor=diff>=0?'#43A047':'#E53935';
const diffText=diff>=0?'+'+diff:''+diff;
compHTML+=`<div class="bar-row"><div class="bar-label">${sub.name}</div><div class="bar-track"><div class="bar-seg" data-v="mastered" style="width:${ss.counts.mastered/sub.items.length*100}%"></div><div class="bar-seg" data-v="basic" style="width:${ss.counts.basic/sub.items.length*100}%"></div><div class="bar-seg" data-v="partial" style="width:${ss.counts.partial/sub.items.length*100}%"></div><div class="bar-seg" data-v="unknown" style="width:${ss.counts.unknown/sub.items.length*100}%"></div></div><div class="bar-val">${ss.pct}%</div></div><div class="bar-row" style="font-size:11px;color:#9FA8DA;margin-top:-4px;margin-bottom:8px"><div class="bar-label"></div><div style="flex:1">班级平均 ${classAvg}% <span style="color:${diffColor};font-weight:600">(${diffText})</span></div></div>`;
});
const subjDetail=SUBJECTS.map(sub=>{
const items=st.subjStats[sub.id].items;
return{sub,unknown:items.filter(it=>it.value==='unknown'),partial:items.filter(it=>it.value==='partial'),basic:items.filter(it=>it.value==='basic'),mastered:items.filter(it=>it.value==='mastered')};
});
const totalCounts=subjDetail.reduce((a,s)=>{a.unknown+=s.unknown.length;a.partial+=s.partial.length;a.basic+=s.basic.length;a.mastered+=s.mastered.length;return a;},{unknown:0,partial:0,basic:0,mastered:0});
const renderCatItems=(items,cls,badge,emptyMsg)=>{
if(!items.length)return `<p style="color:#43A047;font-size:12px;padding:6px 10px">${emptyMsg}</p>`;
return items.map(it=>`<div class="wp-item ${cls}"><span class="wp-badge ${cls}">${badge}</span><div class="wp-info"><div class="wp-title">${it.id}</div><div class="wp-sub">${esc(it.title)}</div></div></div>`).join('');
};
const subjDetailHTML=subjDetail.map(sd=>{
const{sub,unknown,partial,basic,mastered}=sd;
return `<div class="chart-card"><div class="subj-detail-hdr"><span class="subj-detail-icon">${sub.icon}</span><span class="subj-detail-name">${sub.name}</span><span class="subj-detail-pct">${st.subjStats[sub.id].pct}%</span></div><div class="kp-cat-group"><div class="kp-cat-hdr c-unknown">🔴 不会的知识点（${unknown.length}）</div>${renderCatItems(unknown,'unknown','不会','✅ 没有不会的知识点，表现优秀')}</div><div class="kp-cat-group"><div class="kp-cat-hdr c-partial">🟠 部分掌握的知识点（${partial.length}）</div>${renderCatItems(partial,'partial','部分','✅ 没有部分掌握的知识点')}</div><div class="kp-cat-group"><div class="kp-cat-hdr c-basic">🔵 基本掌握的知识点（${basic.length}）</div>${renderCatItems(basic,'basic','基本','— 暂无基本掌握的知识点')}</div><div class="kp-cat-group"><div class="kp-cat-hdr c-mastered">🟢 完全掌握的知识点（${mastered.length}）</div>${renderCatItems(mastered,'mastered','完全','— 暂无完全掌握的知识点')}</div></div>`;
}).join('');
let weakestSub=null,strongestSub=null;
SUBJECTS.forEach(sub=>{
const sp=st.subjStats[sub.id].pct;
if(!weakestSub||sp<weakestSub.pct)weakestSub={name:sub.name,icon:sub.icon,pct:sp};
if(!strongestSub||sp>strongestSub.pct)strongestSub={name:sub.name,icon:sub.icon,pct:sp};
});
const radarSVG=renderRadar(st.subjStats);
let dp=`作为家长，以下是孩子「${stu.name}」的高三各科知识点掌握情况调研数据。请从家长角度进行深度分析：\n\n【学生概况】\n- 姓名：${stu.name}\n- 总掌握率：${st.overallPct}%\n- 已评估知识点：${st.overallCount}/61\n\n【各科掌握情况 vs 班级平均】\n`;
SUBJECTS.forEach(sub=>{
const ss=st.subjStats[sub.id];
const classAvg=ca.avgs?ca.avgs[sub.id]:0;
dp+=`${sub.name}：${ss.pct}%（班级平均${classAvg}%，${ss.pct>=classAvg?'高于':'低于'}平均${Math.abs(ss.pct-classAvg)}%）\n`;
});
dp+='\n【分科目知识点掌握详情】\n';
SUBJECTS.forEach(sub=>{
const ss=st.subjStats[sub.id];
dp+=`\n■ ${sub.name}（掌握率${ss.pct}%）：\n`;
const cats={'不会':ss.items.filter(it=>it.value==='unknown'),'部分掌握':ss.items.filter(it=>it.value==='partial'),'基本掌握':ss.items.filter(it=>it.value==='basic'),'完全掌握':ss.items.filter(it=>it.value==='mastered')};
Object.entries(cats).forEach(([cat,items])=>{dp+=`  ${cat}（${items.length}个）：`;dp+=items.length?items.map(it=>`${it.id}.${it.title}`).join('；'):'无';dp+='\n';});
});
dp+=`\n请分析以下内容：\n1. 孩子的优势科目和薄弱科目\n2. 各科需要重点提升的知识点及原因分析\n3. 与班级平均水平的对比分析\n4. 针对孩子的个性化家庭辅导建议\n5. 暑假期间的学习安排建议`;
const dpJSON=JSON.stringify(dp);

function downloadReport(stu,classAvgData,filename){
const html=buildReportHTML(stu,classAvgData);
const blob=new Blob([html],{type:'text/html;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download=filename||(stu.name+'_学情报告.html');document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function downloadMyReport(){
if(!S.myData){toast('暂无数据','error');return;}
const cs=calcClassStats();
const ca=cs?{n:cs.n,avgs:{}}:{n:0,avgs:{}};
if(cs)SUBJECTS.forEach(sub=>{ca.avgs[sub.id]=cs.subjStats[sub.id].avgPct;});
downloadReport(S.myData,ca,S.myData.name+'_学情报告.html');
toast('已生成学情报告','success');
}

function exportCurrentSurvey(){
const stu={name:S.student.name.trim(),responses:S.student.responses,timestamp:new Date().toISOString()};
const cs=calcClassStats();
const ca=cs?{n:cs.n,avgs:{}}:{n:0,avgs:{}};
if(cs)SUBJECTS.forEach(sub=>{ca.avgs[sub.id]=cs.subjStats[sub.id].avgPct;});
downloadReport(stu,ca,stu.name+'_学情报告.html');
toast('已导出本次填报报告','success');
}

// ===== UTILS =====
function toast(msg,type){
const t=document.getElementById('toast');
t.textContent=msg;
t.className='toast show'+(type?' '+type:'');
setTimeout(()=>t.classList.remove('show'),3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
